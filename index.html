<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerCatalyst | The Unified Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --hc-pink: #D81B60; --hc-light: #FFF5F7; }
        body { background-color: var(--hc-light); font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar { background: linear-gradient(180deg, #880E4F 0%, #D81B60 100%); }
        .feature-card { transition: all 0.3s ease; border: 1px solid #fce4ec; cursor: pointer; height: 100%; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: #f06292; }
        .active-tab { border-left: 4px solid white; background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #D81B60; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar w-72 min-h-screen text-white p-6 flex flex-col sticky top-0">
        <div class="mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter">HerCatalyst 🌸</h1>
            <p class="text-[10px] opacity-70 uppercase tracking-widest mt-1">35-Feature Ecosystem</p>
        </div>
        
        <nav class="space-y-1 flex-1 overflow-y-auto pr-2">
            <button onclick="showTab('academics')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 active-tab" id="btn-academics">
                <i class="fas fa-book-open w-6"></i> <span class="text-sm font-semibold">01 Academics</span>
            </button>
            <button onclick="showTab('health')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-health">
                <i class="fas fa-heartbeat w-6"></i> <span class="text-sm font-semibold">02 Health</span>
            </button>
            <button onclick="showTab('safety')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-safety">
                <i class="fas fa-shield-alt w-6"></i> <span class="text-sm font-semibold">03 Safety</span>
            </button>
            <button onclick="showTab('career')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-career">
                <i class="fas fa-briefcase w-6"></i> <span class="text-sm font-semibold">04 Career</span>
            </button>
            <button onclick="showTab('productivity')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-productivity">
                <i class="fas fa-bolt w-6"></i> <span class="text-sm font-semibold">05 Productivity</span>
            </button>
            <button onclick="showTab('social')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-social">
                <i class="fas fa-users w-6"></i> <span class="text-sm font-semibold">06 Community</span>
            </button>
        </nav>

        <div class="mt-auto p-4 bg-white/10 rounded-2xl">
            <button class="w-full bg-red-500 py-3 rounded-xl font-black shadow-lg animate-pulse">SOS EMERGENCY</button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto h-screen">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h2 id="tab-title" class="text-4xl font-black text-pink-900 mb-2 italic uppercase">Academics</h2>
                <p id="tab-desc" class="text-pink-600 font-medium italic">Empowering your B.Tech journey with 35 integrated tools.</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-pink-900 leading-tight">Niamat Dhillon</p>
                <p class="text-[10px] text-pink-500 uppercase font-black tracking-widest">Lead Researcher</p>
            </div>
        </div>

        <div id="feature-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
    </main>

    <script>
        const allFeatures = {
            academics: [
                { title: "Cycle-Aware Brain", desc: "AI Predictor for concentration & academic focus.", icon: "fa-brain", primary: true, link: "https://hercatalyst.streamlit.app" },
                { title: "E-Library Hub", desc: "Unified access to textbooks, PYQs, and notes.", icon: "fa-book" },
                { title: "Study Gamification", desc: "Earn rewards and badges for module completion.", icon: "fa-trophy" },
                { title: "Attendance Tracker", desc: "Geo-fenced automated class logging.", icon: "fa-check-circle" },
                { title: "Tutor Connect", desc: "Book 1-on-1 sessions with STEM mentors.", icon: "fa-user-graduate" },
                { title: "Research Portfolio", desc: "Showcase your PBL and thesis projects.", icon: "fa-folder-open" }
            ],
            health: [
                { title: "Symptom Tracker", desc: "Log moods, energy, and physical cycles.", icon: "fa-notes-medical" },
                { title: "Mental Health Hub", desc: "Anonymous counseling and peer support.", icon: "fa-spa" },
                { title: "Cycle-Synced Diet", desc: "Nutritional plans tailored to your phase.", icon: "fa-apple-alt" },
                { title: "Fitness Windows", desc: "Workouts optimized for peak energy.", icon: "fa-running" },
                { title: "Medical Vault", desc: "Secure records of campus clinic visits.", icon: "fa-file-medical" },
                { title: "Sleep Tracker", desc: "Monitoring recovery for academic stamina.", icon: "fa-bed" }
            ],
            safety: [
                { title: "Safe-Path Map", desc: "Well-lit campus navigation routes.", icon: "fa-route" },
                { title: "Fake Call Generator", desc: "Automated social escape protocol.", icon: "fa-phone" },
                { title: "Shuttle Trace", desc: "Live location of campus transport.", icon: "fa-bus" },
                { title: "Security Escort", desc: "Request guard assistance for night walks.", icon: "fa-shield-alt" },
                { title: "SOS Beacon", desc: "Instant location ping to campus security.", icon: "fa-bullhorn" }
            ],
            career: [
                { title: "STEM Grants", desc: "Scholarships curated for women in tech.", icon: "fa-microscope" },
                { title: "Job Board", desc: "Internships and on-campus hiring alerts.", icon: "fa-briefcase" },
                { title: "Writing Lab", desc: "AI support for thesis citation and grammar.", icon: "fa-pen-nib" },
                { title: "Alumni Network", desc: "Mentorship from industry-leading women.", icon: "fa-link" },
                { title: "Portfolio Builder", desc: "Dynamic CV generator for researchers.", icon: "fa-id-card" }
            ],
            productivity: [
                { title: "Budget AI", desc: "Tracker for student spending and grants.", icon: "fa-wallet" },
                { title: "Focus Timers", desc: "Phase-aligned Pomodoro work cycles.", icon: "fa-clock" },
                { title: "Smart Alerts", desc: "Reminders based on cognitive load.", icon: "fa-bell" },
                { title: "Personal Diary", desc: "Daily achievement and mood journaling.", icon: "fa-journal-whills" },
                { title: "Event RSVP", desc: "One-click registration for seminars.", icon: "fa-calendar-check" }
            ],
            social: [
                { title: "Women-Only Forums", desc: "Safe spaces for campus discussions.", icon: "fa-comments" },
                { title: "Roommate Finder", desc: "Compatibility matching for campus living.", icon: "fa-home" },
                { title: "Club Hub", desc: "Explore and join student-led organizations.", icon: "fa-users" },
                { title: "Volunteer Portal", desc: "Track community service hours.", icon: "fa-hands-helping" },
                { title: "Campus Radio", desc: "Student-led podcasts and news.", icon: "fa-microphone" }
            ]
        };

        function showTab(category) {
            const grid = document.getElementById('feature-grid');
            const title = document.getElementById('tab-title');
            grid.innerHTML = '';
            title.innerText = category.toUpperCase();

            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('btn-' + category).classList.add('active-tab');

            allFeatures[category].forEach(f => {
                const card = document.createElement('div');
                card.className = `feature-card bg-white p-6 rounded-3xl ${f.primary ? 'border-2 border-pink-500 ring-4 ring-pink-50 shadow-lg' : 'shadow-sm'}`;
                card.innerHTML = `
                    <div class="w-12 h-12 bg-pink-100 rounded-2xl flex items-center justify-center text-pink-600 mb-4">
                        <i class="fas ${f.icon} text-xl"></i>
                    </div>
                    <h4 class="font-black text-pink-900 mb-2">${f.title}</h4>
                    <p class="text-sm text-gray-500 mb-6 leading-relaxed">${f.desc}</p>
                    ${f.primary ? `<a href="${f.link}" target="_blank" class="block w-full text-center bg-pink-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-pink-700 transition-all uppercase tracking-tighter">Launch AI Brain</a>` : ''}
                `;
                grid.appendChild(card);
            });
        }
        showTab('academics');
    </script>
</body>
</html>
