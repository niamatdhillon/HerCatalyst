<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerCatalyst | Unified Student OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --hc-pink: #D81B60; --hc-light: #FFF5F7; }
        body { background-color: var(--hc-light); font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar { background: linear-gradient(180deg, #880E4F 0%, #D81B60 100%); }
        .feature-card { transition: all 0.3s ease; border: 1px solid #fce4ec; cursor: pointer; height: 100%; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); border-color: #f06292; }
        .active-tab { border-left: 4px solid white; background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #D81B60; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar w-72 min-h-screen text-white p-6 flex flex-col sticky top-0">
        <div class="mb-10">
            <h1 class="text-2xl font-black italic tracking-tighter">HerCatalyst 🌸</h1>
            <p class="text-[10px] opacity-70 uppercase tracking-widest mt-1">35-Feature Ecosystem</p>
        </div>
        
        <nav class="space-y-1 flex-1 overflow-y-auto pr-2">
            <button onclick="showTab('academics')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10 active-tab" id="btn-academics">
                <i class="fas fa-book-open w-6"></i> <span class="text-sm font-semibold">01 Academics</span>
            </button>
            <button onclick="showTab('health')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-health">
                <i class="fas fa-heartbeat w-6"></i> <span class="text-sm font-semibold">02 Health</span>
            </button>
            <button onclick="showTab('safety')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-safety">
                <i class="fas fa-shield-alt w-6"></i> <span class="text-sm font-semibold">03 Safety</span>
            </button>
            <button onclick="showTab('career')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-career">
                <i class="fas fa-briefcase w-6"></i> <span class="text-sm font-semibold">04 Career</span>
            </button>
            <button onclick="showTab('productivity')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-productivity">
                <i class="fas fa-bolt w-6"></i> <span class="text-sm font-semibold">05 Productivity</span>
            </button>
            <button onclick="showTab('social')" class="w-full flex items-center p-3 rounded-lg hover:bg-white/10" id="btn-social">
                <i class="fas fa-users w-6"></i> <span class="text-sm font-semibold">06 Community</span>
            </button>
        </nav>

        <div class="mt-auto p-4 bg-white/10 rounded-2xl">
            <button class="w-full bg-red-500 py-3 rounded-xl font-black shadow-lg animate-pulse">SOS EMERGENCY</button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto h-screen">
        <div class="flex justify-between items-start mb-10">
            <div>
                <h2 id="tab-title" class="text-4xl font-black text-pink-900 mb-2 italic uppercase">Academics</h2>
                <p id="tab-desc" class="text-pink-600 font-medium">Empowering students with 35 unique integrated features.</p>
            </div>
            <div class="text-right">
                <p class="text-sm font-bold text-pink-900 leading-tight">Niamat Dhillon</p>
                <p class="text-[10px] text-pink-500 uppercase font-black">Lead Developer</p>
            </div>
        </div>

        <div id="feature-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-10"></div>
    </main>

    <script>
        const allFeatures = {
            academics: [
                { title: "Cycle-Aware Brain", desc: "Predicts peak concentration for B.Tech thesis work.", icon: "fa-brain", primary: true, link: "https://hercatalyst.streamlit.app" },
                { title: "Comprehensive E-Library", desc: "One-stop hub for PYQs, notes, and research.", icon: "fa-book" },
                { title: "Study Gamification", desc: "Badges and rewards for completing modules.", icon: "fa-trophy" },
                { title: "Attendance Log", desc: "Geo-fenced class verification.", icon: "fa-check-circle" },
                { title: "Tutor Connect", desc: "1-on-1 STEM mentorship booking.", icon: "fa-user-graduate" },
                { title: "Research Portfolio", desc: "Showcase PBL projects to recruiters.", icon: "fa-folder-open" }
            ],
            health: [
                { title: "Symptom Tracker", desc: "Mood and physical cycle logging.", icon: "fa-notes-medical" },
                { title: "Mental Health Hub", desc: "Peer support and anonymous counseling.", icon: "fa-spa" },
                { title: "Cycle-Synced Diet", desc: "Nutrition plans for every phase.", icon: "fa-apple-alt" },
                { title: "Fitness Sync", desc: "Workouts designed for energy windows.", icon: "fa-running" },
                { title: "Medical Vault", desc: "Secure digital health records.", icon: "fa-file-medical" }
            ],
            safety: [
                { title: "Safe-Path Map", desc: "Well-lit campus route navigation.", icon: "fa-route" },
                { title: "Fake Call Generator", desc: "Social escape protocol.", icon: "fa-phone" },
                { title: "Shuttle Trace", desc: "Live campus transport tracking.", icon: "fa-bus" },
                { title: "Security Escort", desc: "Request campus guard accompaniment.", icon: "fa-shield-alt" },
                { title: "SOS Beacon", desc: "Instant location ping to security.", icon: "fa-bullhorn" }
            ],
            career: [
                { title: "STEM Grants", desc: "Scholarships curated for women.", icon: "fa-microscope" },
                { title: "Job Board", desc: "On-campus internship alerts.", icon: "fa-briefcase" },
                { title: "Writing Lab", desc: "AI citation and thesis support.", icon: "fa-pen-nib" },
                { title: "Alumni Network", desc: "Mentorship from senior women.", icon: "fa-link" }
            ],
            productivity: [
                { title: "Budget AI", desc: "Student spending tracker.", icon: "fa-wallet" },
                { title: "Focus Timers", desc: "Phase-aligned Pomodoro work.", icon: "fa-clock" },
                { title: "Smart Reminders", desc: "Alerts based on cognitive load.", icon: "fa-bell" },
                { title: "Personal Diary", desc: "Journaling for mental clarity.", icon: "fa-journal-whills" }
            ],
            social: [
                { title: "Women Forums", desc: "Private discussion safe spaces.", icon: "fa-comments" },
                { title: "Roommate Finder", desc: "Peer compatibility matching.", icon: "fa-home" },
                { title: "Club Hub", desc: "RSVP to campus cultural events.", icon: "fa-calendar-star" },
                { title: "Volunteer Portal", desc: "Community impact tracking.", icon: "fa-hands-helping" }
            ]
        };

        function showTab(category) {
            const grid = document.getElementById('feature-grid');
            const title = document.getElementById('tab-title');
            grid.innerHTML = '';
            title.innerText = category.charAt(0).toUpperCase() + category.slice(1);

            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            document.getElementById('btn-' + category).classList.add('active-tab');

            allFeatures[category].forEach(f => {
                const card = document.createElement('div');
                card.className = `feature-card bg-white p-6 rounded-3xl ${f.primary ? 'border-2 border-pink-500 ring-4 ring-pink-50 shadow-lg' : 'shadow-sm'}`;
                card.innerHTML = `
                    <div class="w-12 h-12 bg-pink-100 rounded-2xl flex items-center justify-center text-pink-600 mb-4">
                        <i class="fas ${f.icon} text-xl"></i>
                    </div>
                    <h4 class="font-black text-pink-900 mb-2">${f.title}</h4>
                    <p class="text-sm text-gray-500 mb-6 leading-relaxed">${f.desc}</p>
                    ${f.primary ? `<a href="${f.link}" target="_blank" class="block w-full text-center bg-pink-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-pink-700 transition-all">Launch AI Brain</a>` : ''}
                `;
                grid.appendChild(card);
            });
        }
        showTab('academics');
    </script>
</body>
</html>
